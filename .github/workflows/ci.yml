name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.operating-system }}
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest]
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']

    name: PHP ${{ matrix.php-version }} - ${{ matrix.operating-system }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, mysqli, zip
        coverage: pcov
        tools: composer:v2

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run unit tests
      run: composer test:unit

    - name: Run integration tests
      run: composer test:integration

    - name: Generate coverage report
      if: matrix.php-version == '8.1' && matrix.operating-system == 'ubuntu-latest'
      run: composer test:coverage

    - name: Upload coverage reports to Codecov
      if: matrix.php-version == '8.1' && matrix.operating-system == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        files: ./build/clover.xml
        flags: unittests
        name: codecov-umbrella

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, mysqli, zip
        coverage: pcov
        tools: composer:v2

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-8.1-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-8.1-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Check code style
      run: composer cs-check

    - name: Run static analysis
      run: composer analyze

  e2e:
    runs-on: ubuntu-latest
    name: End-to-End
    permissions:
      contents: read
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: opencart_e2e
          MARIADB_USER: oc_e2e
          MARIADB_PASSWORD: oc_e2e
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uoc_e2e -poc_e2e"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: curl, gd, mbstring, mysqli, openssl, zip, zlib
        coverage: none
        tools: composer:v2

    - name: Cache Composer packages
      id: composer-cache-e2e
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-8.1-e2e-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-8.1-e2e-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run OpenCart end-to-end verification
      env:
        OC_E2E_DB_HOST: 127.0.0.1
        OC_E2E_DB_NAME: opencart_e2e
        OC_E2E_DB_USER: oc_e2e
        OC_E2E_DB_PASS: oc_e2e
        OC_E2E_DB_PORT: 3306
      run: composer test:e2e

  security:
    runs-on: ubuntu-latest
    name: Security Scan
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, mysqli, zip
        coverage: pcov
        tools: composer:v2

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Security scan
      uses: symfonycorp/security-checker-action@v5

  build-phar:
    runs-on: ubuntu-latest
    name: Build PHAR
    needs: [test, code-quality, e2e]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, mysqli, zip, phar
        coverage: pcov
        tools: composer:v2

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

    - name: Build PHAR
      run: |
        curl -fsSL https://github.com/box-project/box/releases/latest/download/box.phar -o box.phar
        chmod +x box.phar
        ./box.phar compile

    - name: Test PHAR
      run: |
        php oc-cli.phar --version
        php oc-cli.phar core:version

    - name: Upload PHAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: oc-cli-phar
        path: oc-cli.phar

  documentation:
    runs-on: ubuntu-latest
    name: Documentation Check
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Check README links
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        use-verbose-mode: 'yes'
        config-file: '.github/markdown-link-check-config.json'

    - name: Validate documentation structure
      run: |
        # Check that all documented commands have corresponding files
        echo "Checking documentation structure..."
        
        # Check if all files mentioned in README exist
        if [ ! -f "docs/installation.md" ]; then
          echo "Missing docs/installation.md"
          exit 1
        fi
        
        if [ ! -f "docs/commands.md" ]; then
          echo "Missing docs/commands.md"
          exit 1
        fi
        
        if [ ! -f "docs/development.md" ]; then
          echo "Missing docs/development.md"
          exit 1
        fi
        
        if [ ! -f "docs/examples.md" ]; then
          echo "Missing docs/examples.md"
          exit 1
        fi
        
        echo "Documentation structure is valid!"
