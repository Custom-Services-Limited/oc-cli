services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: opencart_e2e
      MARIADB_USER: oc_e2e
      MARIADB_PASSWORD: oc_e2e
    ports:
      - "33067:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uoc_e2e", "-poc_e2e"]
      interval: 5s
      timeout: 5s
      retries: 20
